<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions League System</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
  background: black;
}

#bgVideo {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  opacity: 0.6;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(10,15,40,0.6), black);
  z-index: -1;
}

.container {
  text-align: center;
  padding-top: 40px;
}

.trophy {
  width: 130px;
  opacity: 0.9;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px #6c5ce7);
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

.title {
  font-size: 42px;
  margin: 10px 0;
  opacity: 0;
  letter-spacing: 2px;
}

.subtitle {
  opacity: 0;
  color: #aaa;
}

.card {
  margin: 30px auto;
  width: 320px;
  padding: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 40px rgba(108,92,231,0.3);
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #6c5ce7;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 20px #6c5ce7;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.tabs button {
  flex: 1;
  background: rgba(255,255,255,0.1);
}

.tabs button.active {
  background: #6c5ce7;
}

.list {
  margin-top: 10px;
  text-align: left;
  max-height: 120px;
  overflow: auto;
}

.item {
  padding: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-a-stadium-at-night-4513/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <img class="trophy" src="https://upload.wikimedia.org/wikipedia/en/b/bf/UEFA_Champions_League_logo_2.svg">

  <h1 class="title">CHAMPIONS LEAGUE SYSTEM</h1>
  <p class="subtitle">Futuristic Football Registration</p>

  <div class="card">

    <div class="tabs">
      <button id="janediBtn" class="active" onclick="setType('janedi')">Janedi</button>
      <button id="farhangianBtn" onclick="setType('farhangian')">Farhangian</button>
    </div>

    <input id="name" placeholder="Player Name">

    <button onclick="register()">Register</button>

    <div id="list" class="list"></div>

  </div>

</div>

<script>
let type = "janedi";

let data = {
  janedi: [],
  farhangian: []
};

function setType(t){
  type = t;
  document.getElementById("janediBtn").classList.remove("active");
  document.getElementById("farhangianBtn").classList.remove("active");
  document.getElementById(t + "Btn").classList.add("active");
  render();
}

function register(){
  const name = document.getElementById("name").value;
  if(!name) return;

  data[type].push(name);
  document.getElementById("name").value = "";
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data[type].forEach((n)=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = "⚽ " + n;
    list.appendChild(div);
  });
}

// GSAP animations
gsap.to(".title", {opacity:1, y:10, duration:1});
gsap.to(".subtitle", {opacity:1, duration:1, delay:0.5});
gsap.from(".card", {opacity:0, scale:0.8, duration:1, delay:1});
</script>

</body>
</html>
