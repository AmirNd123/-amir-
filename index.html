<!-- فونت --><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet"><!-- کانفتی --><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script><style>

/* UEFA CHAMPIONS LEAGUE THEME */

*{
font-family:'Vazirmatn',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1920');
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
overflow-x:hidden;
}

/* نور متحرک */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,162,255,.2),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(140,0,255,.15),transparent 40%);
animation:glowMove 10s infinite alternate;
pointer-events:none;
}

@keyframes glowMove{
from{transform:translateY(-20px);}
to{transform:translateY(20px);}
}

.card{
background:rgba(255,255,255,.08)!important;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 0 30px rgba(0,162,255,.15),
0 0 60px rgba(0,162,255,.08);
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
background:
linear-gradient(135deg,#001f54,#003c9e,#0b63ff)!important;
position:relative;
overflow:hidden;
}

.header::before{
content:'🏆';
position:absolute;
font-size:120px;
opacity:.08;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.header h1{
font-size:34px!important;
font-weight:800;
text-shadow:0 0 25px #00c3ff;
}

.header p{
opacity:.9;
}

.sanad-box{
background:transparent!important;
}

.sanad-card{
background:rgba(255,255,255,.08)!important;
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.15)!important;
transition:.35s;
}

.sanad-card h3{
color:white!important;
}

.sanad-card .price{
color:#00ffae!important;
}

.sanad-card .capacity{
color:#cbd5e1!important;
}

.sanad-card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:
0 0 15px #00c3ff,
0 0 35px #00c3ff;
}

.sanad-card.selected{
border:2px solid #00c3ff!important;
box-shadow:
0 0 20px #00c3ff,
0 0 40px #00c3ff;
}

label{
color:white!important;
}

input{
background:rgba(255,255,255,.08)!important;
border:1px solid rgba(255,255,255,.2)!important;
color:white!important;
}

input::placeholder{
color:#cbd5e1;
}

input:focus{
border-color:#00c3ff!important;
box-shadow:0 0 20px rgba(0,195,255,.3)!important;
}

.btn-primary{
background:linear-gradient(
45deg,
#004dff,
#00c3ff
)!important;
}

.btn-primary:hover{
transform:scale(.98);
box-shadow:
0 0 20px #00c3ff,
0 0 40px #00c3ff;
}

.btn-success{
background:linear-gradient(
45deg,
#00c853,
#00e676
)!important;
}

.btn-success:hover{
box-shadow:
0 0 20px #00ff88,
0 0 40px #00ff88;
}

.registrants-list{
background:rgba(255,255,255,.05)!important;
}

.registrants-list h3{
color:white!important;
}

.registrant-item{
background:rgba(255,255,255,.08)!important;
border-right:4px solid #00c3ff!important;
}

.registrant-name{
color:white!important;
}

.registrant-date{
color:#cbd5e1!important;
}

.message-success{
background:rgba(0,255,100,.15)!important;
color:#8cffb3!important;
}

.message-error{
background:rgba(255,0,0,.15)!important;
color:#ffb3b3!important;
}

.message-warning{
background:rgba(255,170,0,.15)!important;
color:#ffd98c!important;
}

.admin-trigger{
background:linear-gradient(45deg,#004dff,#00c3ff)!important;
box-shadow:0 0 20px #00c3ff;
}

.admin-box{
background:#0f172a!important;
color:white!important;
}

.empty-list{
color:#cbd5e1!important;
}

</style><script>

document.addEventListener('click',function(e){

if(
e.target.id==='fakePayBtn' ||
e.target.innerText.includes('ثبت‌نامه نهایی')
){

setTimeout(()=>{
confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});
},300);

}

});

</script>
