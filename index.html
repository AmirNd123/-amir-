<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmOWgEU69uns5wArDY90EOFkQBzh5PlqY",
  authDomain: "amir-e5fa8.firebaseapp.com",
  projectId: "amir-e5fa8",
  storageBucket: "amir-e5fa8.firebasestorage.app",
  messagingSenderId: "1002836553065",
  appId: "1:1002836553065:web:cbc6d813ebe8c7349761f8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let type = "janedi";
let temp = null;

// انتخاب سانس
window.selectType = (t) => type = t;

// مرحله اول
window.start = () => {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("اسم وارد کن");

  temp = { name, type };
  show("مرحله اول OK");
};

// ثبت نهایی
window.save = async () => {
  if (!temp) return;

  await addDoc(collection(db, "registrations"), {
    name: temp.name,
    type: temp.type,
    time: Date.now()
  });

  temp = null;
  show("ثبت شد ✅");
};

// پیام
function show(t){
  const el = document.getElementById("msg");
  if (el) el.innerText = t;
}

// 🔥 مهم‌ترین FIX: صبر برای DOM
window.addEventListener("DOMContentLoaded", () => {

  const list = document.getElementById("list");

  if (!list) {
    console.error("LIST element not found");
    return;
  }

  onSnapshot(collection(db, "registrations"), (snap) => {
    const data = snap.docs.map(d => d.data());

    list.innerHTML = data.length
      ? data.map(x => `<div>${x.name} - ${x.type}</div>`).join("")
      : "هیچ ثبت‌نامی وجود ندارد";
  });

});
</script>
